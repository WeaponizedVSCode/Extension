<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Hexagon (r=7, smaller) -->
  <polygon points="12 5, 18.1 8.5, 18.1 15.5, 12 19, 5.9 15.5, 5.9 8.5"/>

  <!-- Reticle arms (gap = r=3) -->
  <line x1="12" y1="5.5" x2="12" y2="9"/>
  <line x1="12" y1="15"  x2="12" y2="18.5"/>
  <line x1="6"  y1="12"  x2="9"  y2="12"/>
  <line x1="15" y1="12"  x2="18" y2="12"/>

  <!-- Reticle ring (r=3) -->
  <circle cx="12" cy="12" r="3" fill="none"/>

  <!-- Center aim dot -->
  <circle cx="12" cy="12" r="0.75" fill="currentColor" stroke="none"/>

  <!-- Circuit nodes at hex vertices -->
  <circle cx="12"   cy="5"    r="1" fill="currentColor" stroke="none"/>
  <circle cx="18.1" cy="8.5"  r="1" fill="currentColor" stroke="none"/>
  <circle cx="18.1" cy="15.5" r="1" fill="currentColor" stroke="none"/>
  <circle cx="12"   cy="19"   r="1" fill="currentColor" stroke="none"/>
  <circle cx="5.9"  cy="15.5" r="1" fill="currentColor" stroke="none"/>
  <circle cx="5.9"  cy="8.5"  r="1" fill="currentColor" stroke="none"/>

  <!-- Wings (anchored at hex flat edges x=5.9/18.1, top longest → bottom shortest) -->
  <line x1="5.9" y1="10"   x2="0.5" y2="6.2"/>
  <line x1="5.9" y1="12.3" x2="1"   y2="9"/>
  <line x1="5.9" y1="14.5" x2="2.5" y2="12.5"/>

  <line x1="18.1" y1="10"   x2="23.5" y2="6.2"/>
  <line x1="18.1" y1="12.3" x2="23"   y2="9"/>
  <line x1="18.1" y1="14.5" x2="21.5" y2="12.5"/>
</svg>
